name: Docker Python

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"   # 1x por hora
  push:
    branches: ["main"]

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # max-parallel: 3
      matrix:
        id: [1,2,3,4,5]
    timeout-minutes: 55   # coloque no nível do job (correto)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Docker
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
            docker run -d \
            --name=traffmonetizer \
            --cpus=0.25 --pull=always --restart=always \
            --log-driver=json-file --log-opt max-size=1m --log-opt max-file=1 \
            --cap-add=NET_ADMIN --cap-add=NET_RAW --sysctl net.ipv4.ip_forward=1 \
            -e TOKEN="$TOKEN" \
            -e DEVNAME=C0MPUT3R-0001 \
            techroy23/docker-traffmonetizer:latest
        # run: docker run --rm traffmonetizer/cli_v2 start accept --token $TOKEN
        # run: docker run --rm -e P2P_EMAIL=$TOKEN techroy23/docker-peer2profit:latest
